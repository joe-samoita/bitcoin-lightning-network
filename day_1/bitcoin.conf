# Enable regtest mode (private testing blockchain)
# This is stored in the Bitcoin data directory (default: ~/.bitcoin/bitcoin.conf)
regtest=1

# Accept RPC commands from local applications
server=1

# Set minimum fee for transactions when fee estimation is unavailable (in BTC)
fallbackfee=0.0001

# RPC port for regtest mode (default mainnet: 8332, testnet: 18332, regtest: 18443)
rpcport=18443

# Load wallet named "alice" on startup (creates if doesn't exist)
wallet=alice

# Load wallet named "bob" on startup
wallet=bob

# RPC authentication username
rpcuser=bitcoin

# RPC authentication password
rpcpassword=bitcoin

# Enable transaction index (allows querying transactions by txid)
txindex=1